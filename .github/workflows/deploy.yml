name: deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stack release tag (e.g. v2.1.0). Empty = default in deploy.sh'
        required: false
        default: ''
      ref:
        description: 'Git ref with deploy scripts (branch or tag)'
        required: false
        default: main
  repository_dispatch:
    types: [deploy-selenoid]

concurrency:
  group: selenoid-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: selenoid-production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve stack version and script ref
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.client_payload.version }}" ]]; then
            echo "tag=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.client_payload.ref || 'main' }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 20m
          script_stop: false
          script: |
            set -euo pipefail
            export SELENOID_VERSION="${{ steps.meta.outputs.tag }}"
            # UI/CM tags are independent of hub; pin to tags that have release assets.
            export SELENOID_UI_VERSION="${SELENOID_UI_VERSION:-v2.1.3}"
            export CM_VERSION="${CM_VERSION:-v2.1.6}"
            export SELENOID_CONFIG_DIR="${{ vars.SELENOID_CONFIG_DIR }}"
            export SELENOID_CONFIG_DIR="${SELENOID_CONFIG_DIR:-/opt/selenoid}"
            export CM_BIN="$HOME/cm"
            STAGING="$HOME/.selenoid-deploy"
            REPO="qa-guru/selenoid.autotests.cloud"
            REF="${{ steps.meta.outputs.ref }}"
            mkdir -p "$STAGING"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/nginx-selenoid.conf" -o /tmp/nginx-selenoid.conf
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/sync-nginx.sh" -o /tmp/sync-nginx.sh
            chmod +x /tmp/sync-nginx.sh
            cp /tmp/sync-nginx.sh /opt/selenoid/bin/sync-nginx.sh 2>/dev/null || true
            export NGINX_CONF_SRC=/tmp/nginx-selenoid.conf
            export NGINX_SYNC_SCRIPT=/tmp/sync-nginx.sh
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/browsers-production.json" -o "$STAGING/browsers-production.json"
            export BROWSERS_PRODUCTION="$STAGING/browsers-production.json"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/deploy.sh" -o "$STAGING/deploy-selenoid.sh"
            chmod +x "$STAGING/deploy-selenoid.sh"
            # Force UI/CM pins even if the host already exported an empty-asset tag.
            export SELENOID_UI_VERSION=v2.1.3
            export CM_VERSION=v2.1.6
            bash "$STAGING/deploy-selenoid.sh"

      - name: Smoke test (public)
        env:
          SELENOID_USER: user1
          SELENOID_PASSWORD: "1234"
          SELENOID_PUBLIC_URL: ${{ vars.SELENOID_PUBLIC_URL }}
        run: |
          if [[ -z "${SELENOID_PUBLIC_URL:-}" ]]; then
            echo "SELENOID_PUBLIC_URL is not set — skip public smoke test" >&2
            exit 0
          fi
          chmod +x deploy/smoke-remote.sh
          ./deploy/smoke-remote.sh "$SELENOID_PUBLIC_URL"
