name: deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stack release tag (e.g. v2.2.1). Empty = default in deploy.sh'
        required: false
        default: ''
      ref:
        description: 'Git ref with deploy scripts (branch or tag)'
        required: false
        default: main
  repository_dispatch:
    types: [deploy-selenoid]

concurrency:
  group: selenoid-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: selenoid-production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve stack version and script ref
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.client_payload.version }}" ]]; then
            echo "tag=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.client_payload.ref || 'main' }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      # Deploy user is selenoid@ (not qaguru) — GHA secrets SELENOID_DEPLOY_*.
      # sudoers allow exact /tmp paths; stage under $HOME then install atomically.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            TAG="${{ steps.meta.outputs.tag }}"
            if [[ -n "$TAG" ]]; then
              export SELENOID_VERSION="$TAG"
            fi
            export SELENOID_UI_VERSION="${SELENOID_UI_VERSION:-v2.3.0}"
            export CM_VERSION="${CM_VERSION:-v2.3.0}"
            export VIDEO_RECORDER_IMAGE="${VIDEO_RECORDER_IMAGE:-qaguru/video-recorder:latest}"
            export SELENOID_CONFIG_DIR="${{ vars.SELENOID_CONFIG_DIR }}"
            export SELENOID_CONFIG_DIR="${SELENOID_CONFIG_DIR:-/opt/selenoid}"
            export CM_BIN="$HOME/cm"
            STAGING="$HOME/.selenoid-deploy"
            REPO="qa-guru/selenoid.autotests.cloud"
            REF="${{ steps.meta.outputs.ref }}"
            mkdir -p "$STAGING"
            # Download into selenoid-owned staging first — shared /tmp may be owned by qaguru.
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/nginx-selenoid.conf" -o "$STAGING/nginx-selenoid.conf"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/sync-nginx.sh" -o "$STAGING/sync-nginx.sh"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/browsers-production.json" -o "$STAGING/browsers-production.json"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/selenoid-hub.service" -o "$STAGING/selenoid-hub.service"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/deploy.sh" -o "$STAGING/deploy-selenoid.sh"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/cleanup-videos.sh" -o "$STAGING/cleanup-videos.sh"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/video-retention.sh" -o "$STAGING/video-retention.sh"
            chmod +x "$STAGING/sync-nginx.sh" "$STAGING/deploy-selenoid.sh" "$STAGING/cleanup-videos.sh" "$STAGING/video-retention.sh"
            # sudoers paths are /tmp/* — replace atomically so another user cannot block writes.
            install -m 644 "$STAGING/nginx-selenoid.conf" /tmp/nginx-selenoid.conf
            install -m 755 "$STAGING/sync-nginx.sh" /tmp/sync-nginx.sh
            install -m 644 "$STAGING/selenoid-hub.service" /tmp/selenoid-hub.service
            install -m 755 "$STAGING/sync-nginx.sh" "${SELENOID_CONFIG_DIR}/bin/sync-nginx.sh" 2>/dev/null || true
            export NGINX_CONF_SRC=/tmp/nginx-selenoid.conf
            export NGINX_SYNC_SCRIPT=/tmp/sync-nginx.sh
            export BROWSERS_PRODUCTION="$STAGING/browsers-production.json"
            export HUB_UNIT_SRC=/tmp/selenoid-hub.service
            export SELENOID_UI_VERSION=v2.3.0
            export CM_VERSION=v2.3.0
            export GIT_REVISION="${GIT_REVISION:-v2.3.0}"
            bash "$STAGING/deploy-selenoid.sh"

      - name: Smoke test (public)
        env:
          SELENOID_USER: qa_engineer
          SELENOID_PASSWORD: "aAb_-4gs53FD"
          SELENOID_PUBLIC_URL: ${{ vars.SELENOID_PUBLIC_URL }}
          SELENOID_VERSION: ${{ steps.meta.outputs.tag || 'v2.3.0' }}
          SELENOID_UI_VERSION: v2.3.0
        run: |
          if [[ -z "${SELENOID_PUBLIC_URL:-}" ]]; then
            echo "SELENOID_PUBLIC_URL is not set — skip public smoke test" >&2
            exit 0
          fi
          chmod +x deploy/smoke-remote.sh
          ./deploy/smoke-remote.sh "$SELENOID_PUBLIC_URL"
