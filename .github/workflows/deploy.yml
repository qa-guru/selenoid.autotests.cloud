name: deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stack release tag (e.g. v2.2.1). Empty = default in deploy.sh'
        required: false
        default: ''
      ref:
        description: 'Git ref with deploy scripts (branch or tag)'
        required: false
        default: main
  repository_dispatch:
    types: [deploy-selenoid]

concurrency:
  group: selenoid-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: selenoid-production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve stack version and script ref
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.client_payload.version }}" ]]; then
            echo "tag=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.client_payload.ref || 'main' }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      # Deploy user stays selenoid@ (canon ops user qaguru is for interactive SSH only).
      # Copy from checkout — do not curl raw.githubusercontent.com (CDN can serve stale deploy.sh).
      - name: Upload deploy scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.SELENOID_DEPLOY_KEY }}
          source: "deploy/deploy.sh,deploy/sync-nginx.sh,deploy/nginx-selenoid.conf,deploy/browsers-production.json,deploy/selenoid-hub.service,deploy/cleanup-videos.sh,deploy/video-retention.sh"
          target: ".selenoid-deploy"
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.SELENOID_DEPLOY_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            TAG="${{ steps.meta.outputs.tag }}"
            if [[ -n "$TAG" ]]; then
              export SELENOID_VERSION="$TAG"
            fi
            export SELENOID_UI_VERSION="${SELENOID_UI_VERSION:-v2.3.5}"
            export CM_VERSION="${CM_VERSION:-v2.3.0}"
            export VIDEO_RECORDER_IMAGE="${VIDEO_RECORDER_IMAGE:-qaguru/video-recorder:latest}"
            export SELENOID_CONFIG_DIR="${{ vars.SELENOID_CONFIG_DIR }}"
            export SELENOID_CONFIG_DIR="${SELENOID_CONFIG_DIR:-/opt/selenoid}"
            export CM_BIN="$HOME/cm"
            STAGING="$HOME/.selenoid-deploy"
            test -x "$STAGING/deploy.sh"
            chmod +x "$STAGING/deploy.sh" "$STAGING/sync-nginx.sh" "$STAGING/cleanup-videos.sh" "$STAGING/video-retention.sh"
            # sudoers paths are /tmp/* — install atomically from selenoid-owned staging.
            install -m 644 "$STAGING/nginx-selenoid.conf" /tmp/nginx-selenoid.conf
            install -m 755 "$STAGING/sync-nginx.sh" /tmp/sync-nginx.sh
            install -m 644 "$STAGING/selenoid-hub.service" /tmp/selenoid-hub.service
            install -m 755 "$STAGING/sync-nginx.sh" "${SELENOID_CONFIG_DIR}/bin/sync-nginx.sh" 2>/dev/null || true
            export NGINX_CONF_SRC=/tmp/nginx-selenoid.conf
            export NGINX_SYNC_SCRIPT=/tmp/sync-nginx.sh
            export BROWSERS_PRODUCTION="$STAGING/browsers-production.json"
            export HUB_UNIT_SRC=/tmp/selenoid-hub.service
            # Force UI/CM pins even if the host already exported an empty-asset tag.
            export SELENOID_UI_VERSION=v2.3.5
            export CM_VERSION=v2.3.0
            export GIT_REVISION="${GIT_REVISION:-v2.3.0}"
            # Prove we are on the optional-flag deploy.sh (not a stale curl cache).
            grep -q supports_flag "$STAGING/deploy.sh"
            bash "$STAGING/deploy.sh"

      - name: Smoke test (public)
        env:
          SELENOID_USER: qa_engineer
          SELENOID_PASSWORD: "aAb_-4gs53FD"
          SELENOID_PUBLIC_URL: ${{ vars.SELENOID_PUBLIC_URL }}
          SELENOID_VERSION: ${{ steps.meta.outputs.tag || 'v2.3.0' }}
          SELENOID_UI_VERSION: v2.3.5
        run: |
          if [[ -z "${SELENOID_PUBLIC_URL:-}" ]]; then
            echo "SELENOID_PUBLIC_URL is not set — skip public smoke test" >&2
            exit 0
          fi
          chmod +x deploy/smoke-remote.sh
          ./deploy/smoke-remote.sh "$SELENOID_PUBLIC_URL"
