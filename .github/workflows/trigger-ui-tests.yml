name: Trigger UI Tests

on:
  workflow_dispatch:
    inputs:
      browser_version:
        description: "Chrome version on Selenoid (e.g. 148)"
        required: false
        default: "148"
      test_class:
        description: "Optional test filter, e.g. tests.LoginTests.successfulAuthorizationTest"
        required: false
      test_case_id:
        description: "Allure TestOps test case ID (optional, for launch name)"
        required: false
  workflow_run:
    workflows: [deploy]
    types: [completed]

concurrency:
  group: trigger-ui-tests
  cancel-in-progress: false

jobs:
  trigger:
    name: Trigger one-page-form-tests-java
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      TESTS_REPO: qa-guru/one-page-form-tests-java
      SELENOID_PUBLIC_URL: ${{ vars.SELENOID_PUBLIC_URL || 'https://selenoid.autotests.cloud' }}
      BROWSER_VERSION: ${{ github.event.inputs.browser_version || '148' }}
      TEST_CLASS: ${{ github.event.inputs.test_class || '' }}
      TEST_CASE_ID: ${{ github.event.inputs.test_case_id || '' }}

    steps:
      - name: Validate configuration
        run: |
          if [[ -z "${{ secrets.UI_TESTS_DISPATCH_TOKEN }}" ]]; then
            echo "::error::Secret UI_TESTS_DISPATCH_TOKEN is not set (PAT with repo scope on ${TESTS_REPO})."
            exit 1
          fi
          if [[ -z "${{ secrets.SELENOID_USER }}" || -z "${{ secrets.SELENOID_PASSWORD }}" ]]; then
            echo "::error::Secrets SELENOID_USER and SELENOID_PASSWORD are required."
            exit 1
          fi

      - name: Dispatch Selenoid UI tests
        id: dispatch
        env:
          DISPATCH_TOKEN: ${{ secrets.UI_TESTS_DISPATCH_TOKEN }}
          SELENOID_USER: ${{ secrets.SELENOID_USER }}
          SELENOID_PASSWORD: ${{ secrets.SELENOID_PASSWORD }}
        run: |
          set -euo pipefail

          BASE="${SELENOID_PUBLIC_URL%/}"
          REMOTE_URL="https://${SELENOID_USER}:${SELENOID_PASSWORD}@${BASE#https://}/wd/hub"
          VIDEO_FOLDER="${BASE}/video/"
          SOURCE_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SOURCE_RUN_URL="${{ github.event.workflow_run.html_url }}"
          fi

          PAYLOAD=$(jq -n \
            --arg remote_url "$REMOTE_URL" \
            --arg base_url "https://qa-guru.github.io/one-page-form/" \
            --arg video_folder "$VIDEO_FOLDER" \
            --arg browser_version "$BROWSER_VERSION" \
            --arg test_class "$TEST_CLASS" \
            --arg test_case_id "$TEST_CASE_ID" \
            --arg selenoid_url "$BASE" \
            --arg source_repo "${{ github.repository }}" \
            --arg source_run_url "$SOURCE_RUN_URL" \
            --arg source_run_id "${{ github.run_id }}" \
            '{
              remote_url: $remote_url,
              base_url: $base_url,
              video_folder: $video_folder,
              browser_version: $browser_version,
              test_class: $test_class,
              test_case_id: $test_case_id,
              selenoid_url: $selenoid_url,
              source_repo: $source_repo,
              source_run_url: $source_run_url,
              source_run_id: $source_run_id
            }')

          RESPONSE=$(curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${TESTS_REPO}/dispatches" \
            -d "$(jq -n --argjson client_payload "$PAYLOAD" '{event_type: "selenoid-run", client_payload: $client_payload}')")

          echo "Dispatched selenoid-run to ${TESTS_REPO}"
          echo "$RESPONSE" | jq . 2>/dev/null || true

      - name: Job summary
        run: |
          {
            echo "## Trigger UI Tests"
            echo ""
            echo "- Target: [\`${{ env.TESTS_REPO }}\`](https://github.com/${{ env.TESTS_REPO }}) (\`selenoid-run\`)"
            echo "- Selenoid: \`${{ env.SELENOID_PUBLIC_URL }}\`"
            echo "- Browser: Chrome \`${{ env.BROWSER_VERSION }}\`"
            if [[ -n "${{ env.TEST_CLASS }}" ]]; then
              echo "- Test filter: \`${{ env.TEST_CLASS }}\`"
            fi
            if [[ -n "${{ env.TEST_CASE_ID }}" ]]; then
              echo "- TestOps case: \`${{ env.TEST_CASE_ID }}\`"
            fi
            echo ""
            echo "Follow the run in [one-page-form-tests-java Actions](https://github.com/${{ env.TESTS_REPO }}/actions/workflows/ui-tests.yml)."
          } >> "$GITHUB_STEP_SUMMARY"
