name: nginx-reload

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref with nginx scripts (branch or tag)'
        required: false
        default: main

jobs:
  nginx:
    runs-on: ubuntu-latest
    environment: selenoid-production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SELENOID_DEPLOY_HOST }}
          username: ${{ secrets.SELENOID_DEPLOY_USER }}
          key: ${{ secrets.SELENOID_DEPLOY_KEY }}
          script: |
            set -euxo pipefail
            REPO="qa-guru/selenoid.autotests.cloud"
            REF="${{ inputs.ref }}"
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/nginx-selenoid.conf" -o /tmp/nginx-selenoid.conf
            curl -fsSL "https://raw.githubusercontent.com/${REPO}/${REF}/deploy/sync-nginx.sh" -o /tmp/sync-nginx.sh
            chmod +x /tmp/sync-nginx.sh
            sudo NGINX_CONF_SRC=/tmp/nginx-selenoid.conf /tmp/sync-nginx.sh

            SERVERNAME="${{ vars.SELENOID_PUBLIC_HOST }}"
            SERVERNAME="${SERVERNAME:-selenoid.autotests.cloud}"
            BASE_URL="https://${SERVERNAME}"

            curl -fsSL "${BASE_URL}/status" >/dev/null
            logs_code="$(curl -s -o /dev/null -w '%{http_code}' -u 'user1:1234' "${BASE_URL}/logs/unknown-session")"
            if [[ "$logs_code" != "400" ]]; then
              echo "FAIL: ${BASE_URL}/logs/unknown-session want HTTP 400, got ${logs_code}" >&2
              exit 1
            fi
            logs_no_auth="$(curl -s -o /dev/null -w '%{http_code}' "${BASE_URL}/logs/unknown-session")"
            if [[ "$logs_no_auth" != "401" ]]; then
              echo "FAIL: ${BASE_URL}/logs/unknown-session without auth want HTTP 401, got ${logs_no_auth}" >&2
              exit 1
            fi
            error_code="$(curl -s -o /dev/null -w '%{http_code}' -u 'user1:1234' "${BASE_URL}/error")"
            if [[ "$error_code" != "404" ]]; then
              echo "FAIL: ${BASE_URL}/error with auth want HTTP 404, got ${error_code}" >&2
              exit 1
            fi
            vnc_code="$(curl -s -o /dev/null -w '%{http_code}' -u 'user1:1234' "${BASE_URL}/vnc/unknown-session")"
            if [[ "$vnc_code" != "400" ]]; then
              echo "FAIL: ${BASE_URL}/vnc/unknown-session with auth want HTTP 400, got ${vnc_code}" >&2
              exit 1
            fi
            echo "OK: nginx reload smoke passed (/status, /logs/, /error, /vnc/)"
