plugins {
    id 'java-library'
    id 'io.qameta.allure' version '4.1.0'
}

repositories {
    mavenCentral()
}

allure {
    version = '3.13.0'
    adapter {
        allureJavaVersion = '2.35.2'
        resultsDir.set(layout.buildDirectory.dir('allure-results'))
    }
    report {
        configFile.set(layout.projectDirectory.file('allurerc.json'))
    }
}

dependencies {
    testImplementation platform('io.qameta.allure:allure-bom:2.35.2')
    testImplementation (
            'io.qameta.allure:allure-jupiter',
            'io.qameta.allure:allure-selenide',
            'com.codeborne:selenide:7.16.2',
            'org.aeonbits.owner:owner:1.0.12',
            'org.junit.jupiter:junit-jupiter:5.11.4')
    testRuntimeOnly (
            'org.junit.platform:junit-platform-launcher',
            'org.slf4j:slf4j-simple:2.0.17')
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
    systemProperty 'env', System.getProperty('env', 'local')
    maxParallelForks = 1
}
