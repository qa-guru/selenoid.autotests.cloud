name: UI Tests

on:
  workflow_dispatch:
    inputs:
      test_class:
        description: "Fully qualified test (optional), e.g. tests.LoginTests.successfulAuthorizationTest"
        required: false
      test_case_id:
        description: "Allure TestOps test case ID (optional, for launch name)"
        required: false
  push:
    branches: [main]

concurrency:
  group: ui-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ALLURE_ENDPOINT: ${{ vars.ALLURE_ENDPOINT || 'https://allure.autotests.cloud' }}
      ALLURE_RESULTS: build/allure-results
      BROWSER_VERSION: "148"
      REPORT_ID: ${{ github.run_id }}
      TEST_CLASS: ${{ github.event.inputs.test_class || '' }}
      TEST_CASE_ID: ${{ github.event.inputs.test_case_id || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load Allure history
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          sparse-checkout: history.jsonl
          sparse-checkout-cone-mode: false

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper

      - name: Restore Allure history
        run: |
          if [ -f gh-pages/history.jsonl ]; then
            cp gh-pages/history.jsonl history.jsonl
          fi

      - name: Install allurectl
        if: vars.ALLURE_PROJECT_ID != '' && secrets.ALLURE_TOKEN != ''
        continue-on-error: true
        id: setup-allurectl
        uses: allure-framework/setup-allurectl@v1
        with:
          allure-endpoint: ${{ env.ALLURE_ENDPOINT }}
          allure-token: ${{ secrets.ALLURE_TOKEN }}
          allure-project-id: ${{ vars.ALLURE_PROJECT_ID }}

      - name: Run UI tests on Selenoid
        run: |
          set +e
          if [ -n "$TEST_CLASS" ]; then
            ./gradlew test --tests "$TEST_CLASS" -Denv=ci -DbrowserVersion="${BROWSER_VERSION}"
          else
            ./gradlew test -Denv=ci -DbrowserVersion="${BROWSER_VERSION}"
          fi
          echo "TEST_EXIT=$?" >> "$GITHUB_ENV"
          set -e

      - name: Upload results to Allure TestOps
        if: always() && steps.setup-allurectl.outcome == 'success' && hashFiles('build/allure-results/**') != ''
        continue-on-error: true
        id: testops-upload
        env:
          ALLURE_PROJECT_ID: ${{ vars.ALLURE_PROJECT_ID }}
        run: |
          set +e
          if [ -n "$TEST_CASE_ID" ]; then
            export ALLURE_LAUNCH_NAME="TestOps #${TEST_CASE_ID} — ${GITHUB_REPOSITORY} #${GITHUB_RUN_NUMBER}"
          else
            export ALLURE_LAUNCH_NAME="UI Tests — ${GITHUB_REPOSITORY} #${GITHUB_RUN_NUMBER}"
          fi
          allurectl upload build/allure-results 2>&1 | tee allurectl-upload.log
          UPLOAD_EXIT=${PIPESTATUS[0]}
          echo "TESTOPS_UPLOAD_EXIT=${UPLOAD_EXIT}" >> "$GITHUB_ENV"
          if [ "$UPLOAD_EXIT" -eq 0 ]; then
            LAUNCH_URL=$(grep -Eo 'https://[^ ]+/launch/[0-9]+' allurectl-upload.log | head -1 || true)
            if [ -z "$LAUNCH_URL" ] && allurectl job-run env >/tmp/allure-env 2>/dev/null; then
              # shellcheck disable=SC1091
              source /tmp/allure-env
              LAUNCH_URL="${ALLURE_LAUNCH_URL:-}"
            fi
            if [ -n "$LAUNCH_URL" ]; then
              echo "TESTOPS_LAUNCH_URL=${LAUNCH_URL}" >> "$GITHUB_ENV"
            fi
          fi
          set -e

      - name: Download Selenoid video
        if: always()
        run: |
          VIDEO_URL=$(grep -rhoE 'https://[^"]+/video/[a-f0-9-]+\.mp4' build/allure-results 2>/dev/null | head -1 || true)
          if [ -n "$VIDEO_URL" ]; then
            curl -fsSL "$VIDEO_URL" -o test-video.mp4
            echo "VIDEO_URL=$VIDEO_URL" >> "$GITHUB_ENV"
          fi

      - name: Generate Allure 3 report
        if: always() && hashFiles('build/allure-results/**') != ''
        id: allure-report
        continue-on-error: true
        run: |
          mkdir -p build/allure-results
          cat > build/allure-results/executor.json <<EOF
          {
            "reportName": "Run #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          ./gradlew allureReport

      - name: Prepare GitHub Pages
        if: always() && steps.allure-report.outcome == 'success' && hashFiles('build/reports/allure-report/allureReport/awesome/index.html') != ''
        run: |
          mkdir -p pages/reports/${REPORT_ID}
          cp -r build/reports/allure-report/allureReport/. "pages/reports/${REPORT_ID}/"
          if [ -f history.jsonl ]; then
            cp history.jsonl pages/history.jsonl
          elif [ -f build/reports/allure-report/allureReport/history.jsonl ]; then
            cp build/reports/allure-report/allureReport/history.jsonl pages/history.jsonl
          fi
          echo "${REPORT_ID}" > pages/latest-run-id.txt
          touch pages/.nojekyll

      - name: Deploy Allure report to GitHub Pages
        if: always() && hashFiles('pages/reports/**/awesome/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          enable_jekyll: false

      - name: Upload test video
        if: always() && hashFiles('test-video.mp4') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-video-${{ env.TEST_CASE_ID || github.run_id }}
          path: test-video.mp4
          retention-days: 14

      - name: Job summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html"
          echo "## UI Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f build/reports/allure-report/allureReport/awesome/index.html ]; then
            echo "- [Allure 3 report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Allure 3 report: _не собран (нет результатов или ошибка генерации)_" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${TESTOPS_LAUNCH_URL:-}" ]; then
            echo "- [Allure TestOps launch](${TESTOPS_LAUNCH_URL})" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${TESTOPS_UPLOAD_EXIT:-}" != "" ] && [ "${TESTOPS_UPLOAD_EXIT}" != "0" ]; then
            echo "- Allure TestOps upload: _ошибка (см. шаг Upload results)_" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${VIDEO_URL:-}" ]; then
            echo "- Selenoid video: \`${VIDEO_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if tests failed
        if: always() && env.TEST_EXIT != '0'
        run: exit "${{ env.TEST_EXIT }}"
