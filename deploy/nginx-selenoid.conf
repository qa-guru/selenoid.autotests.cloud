# nginx для selenoid.autotests.cloud
# Скопировать в /etc/nginx/sites-available/selenoid и включить site.
#
# htpasswd — две связки (students + public guest); sync-nginx.sh создаёт обе:
#   sudo htpasswd -cb /etc/nginx/selenoid.htpasswd user1 1234
#   sudo htpasswd -b  /etc/nginx/selenoid.htpasswd qa_engineer 'aAb_-4gs53FD'
#   sudo chmod 640 /etc/nginx/selenoid.htpasswd
#   sudo chown root:www-data /etc/nginx/selenoid.htpasswd
#
# Проверка и reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Схема: UI (/) без auth; basic auth на /wd/hub и /logs/; /playwright/ —
# accessKey в query (hub -playwright-access-key), не Basic Auth (браузерный WS
# не умеет credentials). Для CI с Authorization — порт 4445.
# Все UI-пути — через selenoid-ui (8080) → hub (4444); /logs/ и /hub/status — напрямую на hub.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $arg_accessKey $playwright_access_key_ok {
    default 0;
    "user1:1234" 1;
    "user1%3A1234" 1;
    "qa_engineer:aAb_-4gs53FD" 1;
    "qa_engineer%3AaAb_-4gs53FD" 1;
}

map $arg_access_key $playwright_access_key_alias_ok {
    default 0;
    "user1:1234" 1;
    "user1%3A1234" 1;
    "qa_engineer:aAb_-4gs53FD" 1;
    "qa_engineer%3AaAb_-4gs53FD" 1;
}

map "$playwright_access_key_ok$playwright_access_key_alias_ok" $playwright_access_key_allowed {
    default 0;
    ~1 1;
}

upstream selenoid_hub {
    server 127.0.0.1:4444;
}

upstream selenoid_ui {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    server_name selenoid.autotests.cloud;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Публичный status (без auth) — UI-shaped JSON с .state (selenoid-ui → hub).
    # .version здесь — stamp selenoid-ui, не hub. Версия hub: /wd/hub/status (auth).
    # Не проксировать напрямую на hub:4444 — UI poll /status каждые 4s и затирает SSE.
    location = /status {
        auth_basic off;
        proxy_pass http://selenoid_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Сырой hub /status для мониторинга (total/used/browsers без .state)
    location = /hub/status {
        auth_basic off;
        proxy_pass http://selenoid_hub/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hub session logs API (WebSocket) — selenoid-ui не проксирует /logs/ (UI → /ws/logs/).
    location ^~ /logs/ {
        auth_basic "Selenoid";
        auth_basic_user_file /etc/nginx/selenoid.htpasswd;

        proxy_pass http://selenoid_hub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hub /error — invalid session JSON (selenoid-ui не проксирует).
    location = /error {
        auth_basic "Selenoid";
        auth_basic_user_file /etc/nginx/selenoid.htpasswd;

        proxy_pass http://selenoid_hub/error;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hub VNC WebSocket — selenoid-ui не проксирует /vnc/ (UI → /ws/vnc/).
    location ^~ /vnc/ {
        auth_basic "Selenoid";
        auth_basic_user_file /etc/nginx/selenoid.htpasswd;

        proxy_pass http://selenoid_hub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebDriver API — basic auth; через UI-прокси на hub
    location ^~ /wd/hub {
        auth_basic "Selenoid";
        auth_basic_user_file /etc/nginx/selenoid.htpasswd;

        proxy_pass http://selenoid_ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Playwright WS — query accessKey instead of Basic Auth.
    location ^~ /playwright/ {
        auth_basic off;
        if ($playwright_access_key_allowed = 0) {
            return 401;
        }

        proxy_pass http://selenoid_ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # UI, VNC, SSE, /video/, … — без basic auth (прокси на UI → hub).
    location / {
        auth_basic off;

        proxy_pass http://selenoid_ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Прямой API hub с auth — для CI/тестов вне браузера (Playwright Authorization header)
server {
    listen 4445 ssl http2;
    server_name selenoid.autotests.cloud;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location / {
        auth_basic "Selenoid API";
        auth_basic_user_file /etc/nginx/selenoid.htpasswd;

        proxy_pass http://selenoid_hub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
